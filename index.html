<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <link rel="icon" href="logo.png" type="image/png">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Rock Paper Scissors</h1>

    <div class="buttons">

        <button class="game-btn" onclick="playGame('Rock')">
            🪨
            <span>Rock</span>
        </button>

        <button class="game-btn" onclick="playGame('Paper')">
            📄
            <span>Paper</span>
        </button>

        <button class="game-btn" onclick="playGame('Scissors')">
            ✂️
            <span>Scissors</span>
        </button>

        <p class="js-result"></p>
        <p class="js-moves"></p>
        <p class="js-score"></p> 

        <button class="reset-btn"
          onclick="
            score.Wins = 0;
            score.Losses = 0;
            score.Tie = 0;
            localStorage.removeItem('score');
            updateScoreElement();
          "
        >
          <span>Reset Score</span>
        </button>

    </div>

</div>
</body>
<script src="script.js"></script>
</html>
